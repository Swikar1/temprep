<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    table {
        border-collapse: collapse;
        width: 100%;
    }

    th, td {
        border: 1px solid black;
        padding: 8px;
        text-align: left;
    }

    th {
        background-color: #e45555;
    }
    
    td{
        background-color: #bde4a7;
    }
    h2{
        text-align: center;
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    </style>
<body>
    <h2>Student Grades</h2>
    <table>
        <tr>
            <th>Subject</th>
            <th>Grade</th>
            <th>GPA</th>
        </tr>
        <tr>
            <td>Math</td>
            <td>A+</td>
            <td>4.0</td>
        </tr>
        <tr>
            <td>Science</td>
            <td>A+</td>
            <td>4.0</td>
        </tr>
        <tr>
            <td>Account</td>
            <td>A</td>
            <td>3.6</td>
        </tr>
        <tr>
            <td>Health and Physical Education</td>
            <td>B+</td>
            <td>3.2</td>
        </tr>
        <tr>
            <td>Social</td>
            <td>B</td>
            <td>3.0</td>
        </tr>
        <tr>
            <td>Optional Maths</td>
            <td>A</td>
            <td>3.6</td>
        </tr>
        <tr>
            <td>English</td>
            <td>A</td>
            <td>4.0</td>
        </tr>
    </table>
</body>
</html>
