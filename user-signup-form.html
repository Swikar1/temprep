<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    h1{
        text-align:center;
    }
    input{
        margin-bottom: 5px;
        margin-top: 5px;
        border-radius: 5px;
        padding:5px;
    }
    .submit-button{
        background-color: #5593e4;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }
   
    .submit-button:hover{
        background-color: #3a6bbf;
    }
    .checkbox{
        margin-bottom: 10px;
        cursor:pointer;
    }
</style>
<body>
    <h1>User Sign Up form</h1>
    <form>
        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username" placeholder="Enter your username" required><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email" required><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password" placeholder="Enter your password" required><br>

        <label for="confirm-password">Confirm Password:</label><br>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required><br>

        
        <input type="checkbox" value="Sign Up" class="checkbox" required> I agree to the terms and conditions<br>
        <input type="submit" value="Sign Up" class="submit-button">
    </form>
</body>
</html>
