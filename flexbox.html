<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    span{
        display: block;
        width: 100px;
        height: 100px;
        border-radius: 10px;
        text-align: center;
        line-height: 15vh;
    }
    .zero{
        background-color: #e45555;
    }
    .one{
        background-color: #66a143;
    }
    .two{
        background-color: #5593e4;
    }
    div{
        height: 400px;
        display:flex;
        justify-content: space-between;
        border: 1px solid black;
        padding: 10px;
        flex-direction: row-reverse;
        align-items: center;
    }
</style>
<body>
    <div>
        <span class="zero">1</span>
        <span class="one">2</span>
        <span class="two">3</span>
    </div>
</body>
</html>
