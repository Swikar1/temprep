<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body{
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }
    span{
        display: block;
        width: 100px;
        height: 100px;
        border-radius: 10px;
        text-align: center;
        line-height: 15vh;
    }
    .zero{
        background-color: #e45555;
    }
    .one{
        background-color: #66a143;
    }
    .two{
        background-color: #5593e4;
    }
    div{
        height: 400px;
        display:flex;
        justify-content: space-between;
        padding: 10px;
        flex-direction:row;
        align-items: center;
    }
    @media (max-width:400px) {
        div{
            flex-direction: column;
        }
        .second-heading{
            display: none;
        }
    }
    @media (min-width:400px) {
        .first-heading{
            display: none;
        }
    }
</style>
<body>
    <h1 class="first-heading">Your Screen is less than 400px</h1>
    <h1 class="second-heading">Your Screen is more than 400px</h1>
    <div>
        <span class="zero">1</span>
        <span class="one">2</span>
        <span class="two">3</span>
    </div>
</body>
</html>
